  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ─── utils ─────────────────────────────────────────────────────────────────────
    const uid = () => Math.random().toString(36).slice(2, 9);

    const fileToBase64 = (file) => new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    });

    // Upload a floor plan file to Firebase Storage and return its public download URL.
    const uploadFloorPlanToStorage = async (file, projectId, floorId) => {
      const path = `floorPlans/${projectId}/${floorId}/${Date.now()}_${file.name}`;
      const ref  = storage.ref(path);
      await ref.put(file);
      return ref.getDownloadURL();
    };

    // Upload a device photo to Firebase Storage and return its download URL.
    const uploadPhotoToStorage = async (file, projectId, floorId, deviceId) => {
      const ext  = file.name.split('.').pop() || 'jpg';
      const path = `photos/${projectId}/${floorId}/${deviceId}/${Date.now()}.${ext}`;
      const ref  = storage.ref(path);
      await ref.put(file, { contentType: file.type });
      return ref.getDownloadURL();
    };

    // Lazy-load jsPDF + autoTable for report generation
    let _jsPdfPromise = null;
    const loadJsPdf = () => {
      if (_jsPdfPromise) return _jsPdfPromise;
      _jsPdfPromise = new Promise((res, rej) => {
        if (window.jspdf) { res(window.jspdf.jsPDF); return; }
        const s1 = document.createElement('script');
        s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        s1.onload = () => {
          const s2 = document.createElement('script');
          s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js';
          s2.onload  = () => res(window.jspdf.jsPDF);
          s2.onerror = () => { _jsPdfPromise = null; rej(new Error('autoTable load failed')); };
          document.head.appendChild(s2);
        };
        s1.onerror = () => { _jsPdfPromise = null; rej(new Error('jsPDF load failed')); };
        document.head.appendChild(s1);
      });
      return _jsPdfPromise;
    };

    // Generate a survey PDF and upload to Firebase Storage; returns download URL.
    const generateAndUploadReport = async (project, projectId) => {
      const JsPDF  = await loadJsPdf();
      const doc    = new JsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const W = 210, M = 15;
      const PURPLE = [73,63,209], DARK = [26,26,46], GRAY = [107,114,128],

      let y = 0;

      // Header bar
      doc.setFillColor(...PURPLE);
      doc.rect(0, 0, W, 18, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(255,255,255);
      doc.text('VergeSense', M, 11);
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...PURPLIGHT);
      doc.text('Site Survey Report', M, 16);
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(255,255,255);
      doc.text('SURVEY COMPLETE', W-M, 11, {align:'right'});
      doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...PURPLIGHT);
      doc.text('Internal Use Only', W-M, 16, {align:'right'});
      y = 26;

      doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(...PURPLE);
      doc.text(project.name || 'Site Survey', M, y); y += 7;
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...GRAY);
      const sub = [project.client, project.address].filter(Boolean).join(' · ');
      if (sub) { doc.text(sub, M, y); y += 5; }
      const dateStr = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      doc.text('Submitted ' + dateStr, M, y); y += 8;
      doc.setDrawColor(...BORDER); doc.setLineWidth(0.3); doc.line(M, y, W-M, y); y += 6;

      // Project details
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...PURPLE);
      doc.text('PROJECT DETAILS', M, y); y += 5;
      const allDev = (project.floors||[]).flatMap(f => f.devices||[]);
      const det = [
        ['PROJECT NAME', project.name||'—', 'CLIENT / ACCOUNT', project.client||'—'],
        ['ADDRESS', project.address||'—', 'SUBMITTED DATE', dateStr],
        ['ONSITE TECHNICIAN(S)', String(project.summary?.onsiteTechs||0), 'VIRTUAL PMs (IF APPLICABLE)', String(project.summary?.virtualPMs||0)],
        ['INSTALLATION DURATION', project.summary?.installationDuration||'—', 'TOTAL DEVICES', String(allDev.length)],
      ];
      det.forEach(([l1,v1,l2,v2]) => {
        doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...GRAY);
        doc.text(l1, M, y); doc.text(l2, 110, y); y += 4;
        doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...DARK);
        doc.text(String(v1), M, y); doc.text(String(v2), 110, y); y += 6;
      });
      y += 2; doc.setDrawColor(...BORDER); doc.line(M, y, W-M, y); y += 5;

      // Totals bar
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...PURPLE);
      doc.text('DEVICE TOTALS', M, y); y += 5;
      const typeCounts = {};
      allDev.forEach(d => { typeCounts[d.deviceType||'Other'] = (typeCounts[d.deviceType||'Other']||0)+1; });
      const boxes = [['Total', allDev.length], ...Object.entries(typeCounts)];
      const bw = (W-2*M) / boxes.length;
      doc.setFillColor(...PURPLE); doc.roundedRect(M, y, W-2*M, 18, 2, 2, 'F');
      boxes.forEach(([lbl, cnt], i) => {
        const bx = M + bw*(i+0.5);
        doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(255,255,255);
        doc.text(String(cnt), bx, y+10, {align:'center'});
        doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...PURPLIGHT);
        doc.text(lbl, bx, y+15, {align:'center'});

      y += 22; doc.setDrawColor(...BORDER); doc.line(M, y, W-M, y); y += 5;

      // Floor breakdown
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...PURPLE);

        doc.setFillColor(234,233,250);

        doc.text(floor.devices.length + ' devices', W-M-3, y+6.5, {align:'right'});
        y += 9;
        // Standard (non-EN1) devices
        const stdDevs = floor.devices.filter(d => d.deviceType !== 'EN1');

          if (y > 240) { doc.addPage(); y = 20; }

      // Submission block
      if (y > 250) { doc.addPage(); y = 20; }
      doc.setDrawColor(...BORDER); doc.line(M, y, W-M, y); y += 5;
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...PURPLE);
      doc.text('SUBMISSION DETAILS', M, y); y += 5;
      doc.setFillColor(...LIGHT); doc.rect(M, y, W-2*M, 22, 'F');
      doc.setDrawColor(...BORDER); doc.rect(M, y, W-2*M, 22, 'S');
      [[`${project.summary?.onsiteTechs||0} technician(s)`, 'SUBMITTED BY', M+5],
       [project.vsContact||'—', 'VS CONTACT', 80],
       [`VS-${Date.now().toString(36).toUpperCase().slice(-6)}`, 'SURVEY ID', 145]

        doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...GRAY);
        doc.text(lbl, x, y+7);
        doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...DARK);
        doc.text(val, x, y+14);
      });

      // Page footers
      const pages = doc.internal.getNumberOfPages();
      for (let i = 1; i <= pages; i++) {
        doc.setPage(i);
        const ph = doc.internal.pageSize.getHeight();
        doc.setFillColor(...LIGHT); doc.rect(0, ph-12, W, 12, 'F');
        doc.setDrawColor(...BORDER); doc.setLineWidth(0.3); doc.line(0, ph-12, W, ph-12);
        doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...GRAY);
        doc.text('Generated by VS Site Surveys  ·  vergesense.com', M, ph-5);
        doc.text(`Page ${i} of ${pages}`, W-M, ph-5, {align:'right'});

      // Upload to Firebase Storage — retry up to 3 times on transient failure
      const blob = doc.output('blob');
      const path = `reports/${projectId}/${Date.now()}_survey.pdf`;
      const ref  = storage.ref(path);
      let downloadURL = null;
      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          await ref.put(blob, { contentType: 'application/pdf' });
          downloadURL = await ref.getDownloadURL();
          break;
        } catch (uploadErr) {
          console.warn(`PDF upload attempt ${attempt} failed:`, uploadErr.message);
          if (attempt === 3) throw uploadErr;
          await new Promise(r => setTimeout(r, 1500 * attempt)); // back-off: 1.5s, 3s
        }
      }
      return downloadURL;

    // IndexedDB helpers — persist PDF files locally across navigation
    const idbOpen = () => new Promise((res, rej) => {

    const processFile = (file) => ({

    const MOUNTING = ["T1", "T2", "T3", "T4"];

    const VS_CONTACTS = [

    // ─── PDF.js loader (singleton promise) ────────────────────────────────────────
    let _pdfJsPromise = null;
    const loadPdfJs = () => {
      if (_pdfJsPromise) return _pdfJsPromise;
      _pdfJsPromise = new Promise((resolve, reject) => {
        if (window.pdfjsLib) { resolve(window.pdfjsLib); return; }
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
        s.onload = () => {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
          resolve(window.pdfjsLib);
        };
        s.onerror = () => { _pdfJsPromise = null; reject(new Error("Could not load PDF.js")); };
        document.head.appendChild(s);
      });
      return _pdfJsPromise;

    // ─── Device detection from canvas pixel data ───────────────────────────────────
    const detectDevicesOnCanvas = (canvas) => {
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      const data = ctx.getImageData(0, 0, w, h).data;
      const maxY = Math.floor(h * 0.82);
      const gs   = Math.max(10, Math.floor(w / 140));

      const isGW  = (r,g,b) =>
        r>=78&&r<=115&&g>=102&&g<=135&&b>=96&&b<=136 &&
        (Math.max(r,g,b)-Math.min(r,g,b)) < 48;
      const isEN1 = (r,g,b) =>
        r>=200&&r<=248&&g>=90&&g<=140&&b>=86&&b<=132 && (r-b)>80;
      const isWifiIcon = (r,g,b) => r < 100 && g < 50 && b > 220;
      const isSensor = (r,g,b) => {
        if (isWifiIcon(r,g,b)) return false;
        const mx = Math.max(r,g,b), mn = Math.min(r,g,b);
        return mx > 85 && mx < 252 && (mx - mn) > 45 && !isGW(r,g,b) && !isEN1(r,g,b);
      };

      const minX = Math.floor(w * 0.035);
      const maxX = Math.floor(w * 0.965);
      const minY = Math.floor(h * 0.030);

      const cells = {};
      for (let y = minY; y < maxY; y += 2) {
        for (let x = minX; x < maxX; x += 2) {
          const i = (y * w + x) * 4;
          const r=data[i], g=data[i+1], b=data[i+2], a=data[i+3];
          if (a < 180) continue;
          if (r > 230 && g > 230 && b > 230) continue;

          let type = null;
          if (isGW(r,g,b))      type = "GW";
          else if (isEN1(r,g,b)) type = "EN1";
          else if (isSensor(r,g,b)) type = "SENSOR";
          if (!type) continue;

          const cx = Math.floor(x / gs);
          const cy = Math.floor(y / gs);
          const key = `${type}:${cx},${cy}`;
          cells[key] = (cells[key] || 0) + 1;
        }
      }

      const MIN_COUNT = { GW: 5, EN1: 10, SENSOR: 30 };

      const hits = [];
      for (const [key, count] of Object.entries(cells)) {
        const colon = key.indexOf(":");
        const type  = key.slice(0, colon);
        if (count < MIN_COUNT[type]) continue;
        const [cx, cy] = key.slice(colon + 1).split(",").map(Number);
        hits.push({ type, x: ((cx+0.5)*gs/w)*100, y: ((cy+0.5)*gs/h)*100, count });
      }

      const MERGE_R = { GW: 2.0, EN1: 1.5, SENSOR: 2.5 };

      hits.sort((a, b) => b.count - a.count);
      const merged = [];
      const used   = new Set();
      for (let i = 0; i < hits.length; i++) {
        if (used.has(i)) continue;
        const a = hits[i];
        const mr = MERGE_R[a.type];
        let sx = a.x, sy = a.y, n = 1;
        for (let j = i + 1; j < hits.length; j++) {
          if (used.has(j)) continue;
          const b = hits[j];
          if (b.type === a.type && Math.abs(b.x-a.x) < mr && Math.abs(b.y-a.y) < mr) {
            sx += b.x; sy += b.y; n++;
            used.add(j);
          }
        }
        used.add(i);
        merged.push({ type: a.type, x: sx / n, y: sy / n });
      }

      const en1Hits = merged.filter(d => d.type === "EN1");
      const EN1_EXCLUSION_R = 1.5;
      const filtered = merged.filter(d => {
        if (d.type !== "SENSOR") return true;
        return !en1Hits.some(e =>
          Math.abs(d.x - e.x) < EN1_EXCLUSION_R && Math.abs(d.y - e.y) < EN1_EXCLUSION_R
        );
      });

      return filtered;
    };

    // ─── Demo floor plan as inline SVG ─────────
    const DemoFloorPlanSVG = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" style={{ display: "block" }}>

        <line x1="585" y1="15"  x2="585" y2="325" stroke="#555" strokeWidth="3" />
        <line x1="15"  y1="175" x2="215" y2="175" stroke="#555" strokeWidth="3" />

    // ─── FloorPdfThumb: loads thumbnail from IndexedDB or Firebase Storage URL ────
    const _thumbCache = {};
    const FloorPdfThumb = ({ floorId, name, url }) => {
      const [thumb, setThumb]     = React.useState(_thumbCache[floorId] || null);
      const [loading, setLoading] = React.useState(false);
      React.useEffect(() => {
        if (_thumbCache[floorId]) { setThumb(_thumbCache[floorId]); return; }
        let cancelled = false;
        idbGetThumb(floorId).then(async (cached) => {
          if (cancelled) return;
          if (cached) { _thumbCache[floorId] = cached; setThumb(cached); return; }
          if (!url) return;
          setLoading(true);
          try {
            const lib  = await loadPdfJs();
            const resp = await fetch(url);
            const buf  = await resp.arrayBuffer();
            if (cancelled) return;
            const pdf  = await lib.getDocument({ data: new Uint8Array(buf) }).promise;
            const page = await pdf.getPage(1);
            const vp   = page.getViewport({ scale: 1 });
            const cv   = document.createElement('canvas');
            cv.width = vp.width; cv.height = vp.height;
            await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
            if (cancelled) return;
            const dataUrl = cv.toDataURL('image/jpeg', 0.82);
            _thumbCache[floorId] = dataUrl;
            setThumb(dataUrl);
            idbSaveThumb(floorId, dataUrl).catch(() => {});
          } catch(e) { /* silently fall back to filename */ }
          finally { if (!cancelled) setLoading(false); }
        }).catch(() => {});
        return () => { cancelled = true; };
      }, [floorId, url]);
      if (thumb) return <img src={thumb} alt={name} style={{ width: "100%", display: "block" }} />;
      return (
        <div className="bg-gray-100 flex items-center justify-center gap-2" style={{ height: 120 }}>
          {loading
            ? <><div className="w-5 h-5 border-2 border-[#5a50d8] border-t-transparent rounded-full animate-spin flex-shrink-0" /><span className="text-xs text-gray-400">Loading preview…</span></>

        </div>
      );
    };

    // ─── PdfCanvas: renders a PDF page to <canvas>, then displays it as <img> ─────
    const PdfCanvas = ({ url, file, onRendered, onDisplayUrl }) => {
      const [imgUrl, setImgUrl]   = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError]     = useState(null);

      useEffect(() => {
        let cancelled = false;
        setLoading(true);
        setError(null);
        setImgUrl(null);

        (async () => {
          try {
            if (!file && !url) throw new Error("No floor plan source — PM may need to re-upload this floor plan.");
            const lib = await loadPdfJs();
            const arrayBuffer = await new Promise((resolve, reject) => {
              if (file) {
                const reader = new FileReader();
                reader.onload  = (e) => resolve(e.target.result);
                reader.onerror = () => reject(new Error("FileReader failed"));
                reader.readAsArrayBuffer(file);
              } else {
                fetch(url, { mode: 'cors' })
                  .then((r) => { if (!r.ok) throw new Error(`Fetch failed: ${r.status}`); return r.arrayBuffer(); })
                  .then(resolve).catch(reject);
              }
            });

            const pdf  = await lib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
            const page = await pdf.getPage(1);

            const vpHi = page.getViewport({ scale: 2 });
            const hiCanvas = document.createElement("canvas");
            hiCanvas.width  = vpHi.width;
            hiCanvas.height = vpHi.height;
            await page.render({ canvasContext: hiCanvas.getContext("2d"), viewport: vpHi }).promise;
            if (cancelled) return;
            if (onRendered) onRendered(hiCanvas);

            const vpLo = page.getViewport({ scale: 1.5 });
            const loCanvas = document.createElement("canvas");
            loCanvas.width  = vpLo.width;
            loCanvas.height = vpLo.height;
            await page.render({ canvasContext: loCanvas.getContext("2d"), viewport: vpLo }).promise;
            if (cancelled) return;
            const dataUrl = loCanvas.toDataURL("image/jpeg", 0.88);
            setImgUrl(dataUrl);
            if (onDisplayUrl) onDisplayUrl(dataUrl);
            setLoading(false);
          } catch (err) {
            if (!cancelled) {
              console.error("PDF render:", err);
              setError(err.message || "Could not render PDF");
              setLoading(false);
            }
          }
        })();

        return () => { cancelled = true; };
      }, [url, file]);

      if (loading) return (
        <div style={{ height: 300 }} className="bg-gray-100 flex flex-col items-center justify-center gap-3">
          <div className="w-9 h-9 border-4 border-[#5a50d8] border-t-transparent rounded-full animate-spin" />
          <p className="text-sm text-gray-500 font-medium">Rendering PDF…</p>
          <p className="text-xs text-gray-400">This may take a few seconds</p>
        </div>
      );
      if (error) return (
        <div style={{ height: 200 }} className="bg-red-50 flex flex-col items-center justify-center gap-2 p-4">
          <p className="text-2xl">⚠️</p>
          <p className="text-sm text-red-600 text-center font-medium">PDF could not render</p>
          <p className="text-xs text-red-400 text-center">{error}</p>
        </div>
      );
      return (
        <img src={imgUrl} alt="floor plan" style={{ width: "100%", display: "block" }} draggable={false} />
      );
    };

    // ─── FloorPlanCanvas ───────────────────────────────────────────────────────────
    const FloorPlanCanvas = ({ floorPlan, pdfFile, placing, suppressBanner, onClickOverlay, onPdfRendered, onPdfDisplayUrl, containerRef: extRef, children }) => {
      const innerRef  = useRef(null);
      const wrapRef   = useRef(null);
      const zoomRef   = useRef(1);
      const pinchRef  = useRef(null);
      const [zoom, setZoom] = useState(1);

      // Keep zoomRef in sync so event listeners always see current value
      useEffect(() => { zoomRef.current = zoom; }, [zoom]);

      const clampZoom = (z) => Math.round(Math.min(4, Math.max(1, z)) * 10) / 10;

      // Attach touch + wheel listeners with passive:false so we can preventDefault
      useEffect(() => {
        const el = wrapRef.current;
        if (!el) return;

        const getDist = (t) => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);

        const onTouchStart = (e) => {
          if (e.touches.length === 2)
            pinchRef.current = { startDist: getDist(e.touches), startZoom: zoomRef.current };
        };
        const onTouchMove = (e) => {
          if (!pinchRef.current || e.touches.length !== 2) return;
          e.preventDefault();
          setZoom(clampZoom(pinchRef.current.startZoom * (getDist(e.touches) / pinchRef.current.startDist)));
        };
        const onTouchEnd = () => { pinchRef.current = null; };
        const onWheel = (e) => {
          if (!e.ctrlKey && !e.metaKey) return;
          e.preventDefault();
          setZoom(z => clampZoom(z * (1 - e.deltaY * 0.008)));
        };

        el.addEventListener('touchstart', onTouchStart, { passive: true });
        el.addEventListener('touchmove',  onTouchMove,  { passive: false });
        el.addEventListener('touchend',   onTouchEnd,   { passive: true });
        el.addEventListener('wheel',      onWheel,      { passive: false });
        return () => {
          el.removeEventListener('touchstart', onTouchStart);
          el.removeEventListener('touchmove',  onTouchMove);
          el.removeEventListener('touchend',   onTouchEnd);
          el.removeEventListener('wheel',      onWheel);
        };
      }, []);

      const attachInner = (el) => {
        innerRef.current = el;
        if (extRef) extRef.current = el;
      };

      const handleClick = (e) => {
        if (!placing || !innerRef.current) return;
        const rect = innerRef.current.getBoundingClientRect();
        onClickOverlay(
          ((e.clientX - rect.left) / rect.width)  * 100,
          ((e.clientY - rect.top)  / rect.height) * 100,
        );
      };

      return (
        <div style={{ position: "relative", borderRadius: "0.75rem" }}
          className={`select-none border-2 transition-colors ${placing ? "border-[#5a50d8]" : "border-gray-200"}`}>
          <div ref={wrapRef} style={{
              overflow: zoom > 1 ? "auto" : "hidden",
              height:   zoom > 1 ? 320 : undefined,
              borderRadius: "0.75rem",
            }}>
            <div ref={attachInner} onClick={handleClick}
              style={{ width: `${zoom * 100}%`, minHeight: 260, position: "relative" }}
              className={placing ? "cursor-crosshair" : ""}>
              {floorPlan?.isDemo ? (
                <DemoFloorPlanSVG />
              ) : floorPlan?.isPdf ? (
                <PdfCanvas url={floorPlan.url} file={pdfFile || floorPlan.file} onRendered={onPdfRendered} onDisplayUrl={onPdfDisplayUrl} />
              ) : floorPlan?.url ? (
                <img src={floorPlan.url} alt="floor plan" style={{ width: "100%", display: "block" }} draggable={false} />
              ) : null}
              {children}
              {placing && !suppressBanner && (
                <div className="absolute inset-0 pointer-events-none flex items-end justify-center pb-4" style={{ zIndex: 20 }}>
                  <div className="bg-[#3a31c4] text-white text-sm px-4 py-2 rounded-full shadow-lg font-semibold">
                    Tap floor plan to place device
                  </div>
                </div>
              )}
            </div>
          </div>
          <div style={{ position: "absolute", bottom: 8, right: 8, zIndex: 30 }}
            className="flex items-center gap-0.5 bg-black/55 rounded-lg px-2 py-1 backdrop-blur-sm">
            <button
              onClick={(e) => { e.stopPropagation(); setZoom((z) => clampZoom(z - 0.5)); }}
              className="text-white text-xs font-bold px-1.5 py-0.5 rounded">−</button>
            <span className="text-white text-xs font-semibold px-1 min-w-8 text-center">{zoom.toFixed(1)}×</span>
            <button
              onClick={(e) => { e.stopPropagation(); setZoom((z) => clampZoom(z + 0.5)); }}

          </div>

      const [df, setDf]                         = useState(emptyDf);

      // Firebase auth state listener
      useEffect(() => {
        const unsub = auth.onAuthStateChanged((user) => {
          setCurrentUser(user);
          setAuthReady(true);
        });
        return unsub;
      }, []);

      // Load projects from Firestore — only when auth is ready
      useEffect(() => {
        if (!authReady) return;
        const unsubscribe = db.collection('projects')
          .orderBy('createdAt', 'desc')
          .onSnapshot((snapshot) => {
            setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            setDbReady(true);
          }, (err) => {
            console.error('Firestore error:', err);
            setDbReady(true);
          });
        return unsubscribe;
      }, [authReady]);

      // Derived state
      const project     = projects.find((p) => p.id === activeId);
      const activeFloor = project?.floors.find((f) => f.id === activeFloorId);
      const activeDev   = activeFloor?.devices.find((d) => d.id === activeDevId);
      const allDevices  = project?.floors.flatMap((f) => f.devices) ?? [];
      const totalDev    = allDevices.length;
      const doneDev     = allDevices.filter((d) => d.complete).length;
      const techLocked  = techMode && project?.status === "submitted";

      // Google Sign-In
      const signInWithGoogle = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ hd: "vergesense.com" }); // restrict to VS accounts
        auth.signInWithPopup(provider).catch((err) => showToast("Sign-in failed: " + err.message, "error"));
      };
      const signOut = () => {
        auth.signOut();
        setTechMode(false);
        setActiveId(null);
        setScreen("list");
      };

      // Show all projects by default; "My Projects" toggle filters to signed-in PM's own
      const filteredByOwner = (showMyProjects && currentUser)
        ? projects.filter((p) => p.vsContact?.email === currentUser.email)
        : projects;
      const visibleProjects = searchQuery.trim()
        ? filteredByOwner.filter((p) =>
            (p.name || "").toLowerCase().includes(searchQuery.toLowerCase()) ||
            (p.siteName || "").toLowerCase().includes(searchQuery.toLowerCase()) ||
            (p.address || "").toLowerCase().includes(searchQuery.toLowerCase())
          )
        : filteredByOwner;

      const showToast = (msg, type = "success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 4000);
      };

      const getAccessCode = (proj) => (proj.id + "000000").slice(0, 6).toUpperCase();

      // ── Firestore mutations ───────────────────────────────────────────────────────
      const setProject = (id, updates) => {
        db.collection('projects').doc(id).update(updates);
      };

      const setFloor = (pId, fId, updates) => {
        const proj = projects.find(p => p.id === pId);
        if (!proj) { console.error('setFloor: project not found', pId); return; }
        const updatedFloors = proj.floors.map(f => f.id === fId ? { ...f, ...updates } : f);
        db.collection('projects').doc(pId).update({ floors: updatedFloors })
          .catch(err => {
            console.error('setFloor write failed:', err.code, err.message);
            showToast('❌ Save failed: ' + err.message, 'error');
          });
      };

      const createProject = () => {
        if (!np.name || !np.siteName || !np.vsName || !np.vsEmail) return;
        const id = uid();
        const proj = {
          name: np.name, siteName: np.siteName, address: np.address,
          vsContact: { name: np.vsName, email: np.vsEmail },
          status: "in_progress",
          floors: [{ id: uid(), name: "Floor 1", floorPlan: null, devices: [] }],
          summary: { onsiteTechs: "", virtualPMs: "", duration: "", comments: "" },
          createdAt: new Date().toISOString(),
        };
        db.collection('projects').doc(id).set(proj).then(() => {
          setActiveId(id);
          setTab("floors");
          setNp({ name: "", siteName: "", address: "", vsName: "", vsEmail: "", vsPreset: "" });
          setScreen("project");
        });
      };

      const addFloor = () => {
        const n = (project?.floors.length ?? 0) + 1;
        setProject(activeId, {
          floors: [...(project?.floors ?? []), { id: uid(), name: `Floor ${n}`, floorPlan: null, devices: [] }],
        });
      };

      const deleteFloor = (fId) => {
        if (project.floors.length <= 1) return showToast("A project needs at least one floor", "error");
        setProject(activeId, { floors: project.floors.filter((f) => f.id !== fId) });
        showToast("Floor removed");
      };

      const deleteProject = (id) => {
        db.collection('projects').doc(id).delete();
      };

      const placeDevice = (x, y) => {
        if (!activeFloor) return;
        const dev = {
          id: uid(), number: activeFloor.devices.length + 1,
          x, y, ceilingHeight: "", mountingMethod: "", deviceType: "", notes: "", photos: [], complete: false,
        };
        setFloor(activeId, activeFloorId, { devices: [...activeFloor.devices, dev] });
        setActiveDevId(dev.id);
        setDf(emptyDf);
        setPlacing(false);
        setScreen("device");
      };

      const bulkPlaceDevices = (detected, sensorType) => {
        if (!activeFloor) return;
        const startNum = activeFloor.devices.length + 1;
        const newDevs = detected.map((d, i) => ({
          id: uid(), number: startNum + i,
          x: d.x, y: d.y,
          ceilingHeight: "", mountingMethod: "",
          deviceType: d.type === "SENSOR" ? sensorType : d.type,
          notes: "", photos: [], complete: false,
        }));
        setFloor(activeId, activeFloorId, { devices: [...activeFloor.devices, ...newDevs] });
        setScanModal(null);
        showToast(`✓ Placed ${newDevs.length} devices from markup`);
      };

      const saveDevice = () => {
        const isEN1 = df.deviceType === 'EN1';
        const isComplete = isEN1
          ? !!df.en1_doorFrameHeight && !!df.ceilingHeight && !!df.en1_doorWidth && !!df.mountingMethod &&
            !!df.en1_exitSigns && !!df.en1_sprinklers && !!df.en1_hangingFixtures && !!df.en1_doorDirection &&
            df.photos.length > 0
          : !!df.mountingMethod && !!df.ceilingHeight && !!df.deviceType;
        const updated = activeFloor.devices.map((d) =>
          d.id === activeDevId ? { ...d, ...df, complete: isComplete } : d,
        );
        setFloor(activeId, activeFloorId, { devices: updated });
        setScreen("floor");
        showToast("Device saved ✓");
      };

      const deleteDevice = (devId) => {
        const renumbered = activeFloor.devices
          .filter((d) => d.id !== devId)
          .map((d, i) => ({ ...d, number: i + 1 }));
        setFloor(activeId, activeFloorId, { devices: renumbered });
        showToast("Device removed");
      };

      const moveDevice = (devId, x, y) => {
        setFloor(activeId, activeFloorId, {
          devices: activeFloor.devices.map((d) =>
            d.id === devId ? { ...d, x, y } : d,
          ),
        });
      };

      const quickPlaceDevice = (x, y) => {
        if (justDraggedRef.current) return;
        if (!activeFloor) return;
        setQuickPlacePos({ x, y });
      };

      const confirmQuickPlace = (deviceType) => {
        if (!quickPlacePos || !activeFloor) return;
        const num = activeFloor.devices.length + 1;
        const dev = {
          id: uid(), number: num,
          x: quickPlacePos.x, y: quickPlacePos.y,
          ceilingHeight: "", mountingMethod: "",
          deviceType: deviceType ?? "",
          notes: "", photos: [], complete: false,
        };
        setFloor(activeId, activeFloorId, { devices: [...activeFloor.devices, dev] });
        setQuickPlacePos(null);
        showToast(`#${num} ${deviceType || "device"} added`);
      };

      const submitSurvey = async () => {
        if (!project) return;

        const payload = {
          projectId: activeId,
          projectName: project.name,
          siteName: project.siteName,
          address: project.address,
          vsContact: project.vsContact,
          submittedAt: new Date().toISOString(),
          techName: techName || "",
          summary: project.summary,
          floors: project.floors.map(floor => ({
            floorName: floor.name,
            devices: floor.devices.map(dev => ({
            number: dev.number,
              deviceType: dev.deviceType,
              ceilingHeight: dev.ceilingHeight,
              mountingMethod: dev.mountingMethod,
              notes: dev.notes,
              complete: dev.complete,
              photos: dev.photos || [],
              ...(dev.deviceType === 'EN1' ? {
                en1_doorFrameHeight: dev.en1_doorFrameHeight || "",
                en1_doorWidth: dev.en1_doorWidth || "",
                en1_exitSigns: dev.en1_exitSigns || "",
                en1_sprinklers: dev.en1_sprinklers || "",
                en1_hangingFixtures: dev.en1_hangingFixtures || "",
                en1_doorDirection: dev.en1_doorDirection || "",
              } : {}),
            })),
            deviceCounts: {
              areaSensors: floor.devices.filter(d => d.deviceType === 'L410' || d.deviceType === 'E106').length,
              en1: floor.devices.filter(d => d.deviceType === 'EN1').length,
              gateways: floor.devices.filter(d => d.deviceType === 'GW').length,
              total: floor.devices.length,
              complete: floor.devices.filter(d => d.complete).length,
            },
            mountingCounts: {
              T1: floor.devices.filter(d => d.mountingMethod === 'T1').length,
              T2: floor.devices.filter(d => d.mountingMethod === 'T2').length,
              T3: floor.devices.filter(d => d.mountingMethod === 'T3').length,
              T4: floor.devices.filter(d => d.mountingMethod === 'T4').length,
            },
          })),
        };

        try {
          showToast("Submitting survey...", "info");

          // Generate the survey PDF report and upload to Firebase Storage
          let reportPdfUrl = null;
          try {
            showToast("Generating PDF report...", "info");
            reportPdfUrl = await generateAndUploadReport(project, activeId);
            payload.reportPdfUrl = reportPdfUrl;
          } catch (pdfErr) {
            console.warn("PDF generation failed (continuing submission):", pdfErr);
          }

          if (N8N_WEBHOOK_URL && !N8N_WEBHOOK_URL.startsWith('REPLACE')) {
            await fetch(N8N_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
          }

          await db.collection('projects').doc(activeId).update({
            status: 'submitted',
            submittedAt: new Date().toISOString(),
            reportPdfUrl: reportPdfUrl || null,
          });

          setConfirmReady(false);
          showToast("✅ Survey submitted!");
        } catch (err) {
          console.error(err);
          showToast("Submission failed — try again", "error");
        }
      };

      const runScan = () => {
        if (!pdfCanvas) return;
        const detected = detectDevicesOnCanvas(pdfCanvas);
        setScanModal({ detected, sensorType: "L410" });
      };

      const kitCounts = (proj) => {
        const c = { T1: 0, T2: 0, T3: 0, T4: 0 };
        (proj?.floors ?? []).flatMap((f) => f.devices).forEach((d) => {
          if (c[d.mountingMethod] !== undefined) c[d.mountingMethod]++;
        });
        return c;
      };

      const scanHasGW     = scanModal?.detected.some((d) => d.type === "GW") ?? false;
      const scanCount     = {
        GW:     scanModal?.detected.filter((d) => d.type === "GW").length     ?? 0,
        EN1:    scanModal?.detected.filter((d) => d.type === "EN1").length     ?? 0,
        SENSOR: scanModal?.detected.filter((d) => d.type === "SENSOR").length  ?? 0,
      };
      const scanTotal     = (scanModal?.detected.length) ?? 0;

      // Show loading screen while Firestore initializes
      // ── Auth / loading gate ───────────────────────────────────────────────────────
      if (!authReady) {
        return (
          <div className="min-h-screen bg-gray-50 flex items-center justify-center">
            <div className="text-center">
              <div className="w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-4" style={{background:"#493FD1"}}>
                <span className="text-white text-xl font-bold">VS</span>
              </div>
              <p className="text-gray-500 text-sm">Loading...</p>
            </div>
          </div>
        );
      }

      // ── Sign-in screen (shown when not signed in AND not in tech mode) ────────────
      if (!currentUser && !techMode) {
        return (
          <div className="min-h-screen bg-gray-50 flex items-center justify-center px-4">
            <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-8 w-full max-w-sm text-center">
              <div className="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-5" style={{background:"#493FD1"}}>
                <span className="text-white text-2xl font-bold">VS</span>
              </div>
              <h1 className="text-xl font-bold text-gray-900 mb-1">Site Surveys</h1>
              <p className="text-sm text-gray-500 mb-8">VergeSense delivery team tool</p>

              {/* PM sign-in */}
              <button onClick={signInWithGoogle}
                className="w-full flex items-center justify-center gap-3 border border-gray-300 rounded-xl px-4 py-3 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors mb-6">
                <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
                Sign in with Google
              </button>

              <div className="relative mb-6">
                <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-200" /></div>
                <div className="relative flex justify-center"><span className="bg-white px-3 text-xs text-gray-400">or</span></div>
              </div>

              {/* Tech code entry */}
              <p className="text-xs text-gray-500 font-medium mb-2">🔧 Field tech? Enter your name and project code</p>
              <input
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-[#5a50d8]"
                placeholder="Your full name"
                value={techNameInput}
                onChange={(e) => setTechNameInput(e.target.value)}
              />
              <div className="flex gap-2">
                <input
                  className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono uppercase tracking-widest focus:outline-none focus:ring-2 focus:ring-[#5a50d8]"
                  placeholder="ABC123"
                  value={techCodeInput}
                  maxLength={6}
                  onChange={(e) => setTechCodeInput(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ""))}
                  onKeyDown={(e) => { if (e.key === "Enter") e.currentTarget.nextSibling?.click(); }}
                />
                <Btn onClick={async () => {
                  const match = projects.find((p) => getAccessCode(p) === techCodeInput);
                  if (match) {
                    // Ensure anonymous auth is complete before proceeding
                    // so Firestore writes work immediately when tech saves devices
                    if (!auth.currentUser) {
                      try { await firebase.auth().signInAnonymously(); } catch(e) {}
                    }
                    setTechMode(true);
                    setTechName(techNameInput);
                    setActiveId(match.id);
                    setTab("floors");
                    setTechCodeInput("");
                    setScreen("project");
                  } else {
                    showToast("Code not found — check with your VS Contact", "error");
                  }
                }} disabled={techCodeInput.length < 5 || !techNameInput.trim()}>
                  Go →
                </Btn>
              </div>
            </div>
          </div>
        );
      }

      // ── render ────────────────────────────────────────────────────────────────────
      return (
        <div className="min-h-screen bg-gray-50" style={{ fontFamily: "system-ui,-apple-system,sans-serif" }}>

          {/* ── toast ── */}
          {toast && (
            <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] px-4 py-2 rounded-xl shadow-xl text-sm font-medium text-white pointer-events-none ${toast.type === "error" ? "bg-red-600" : toast.type === "info" ? "bg-blue-600" : "bg-gray-900"}`}>
              {toast.msg}
            </div>
          )}

          {/* ══════════════ PROJECT LIST ══════════════ */}
          {screen === "list" && (
            <div className="max-w-lg mx-auto pb-8">
              <div className="bg-white border-b px-4 py-4 sticky top-0 z-10">
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-2">
                    <div className="w-6 h-6 rounded bg-[#493FD1] flex items-center justify-center">
                      <span className="text-white text-xs font-bold">VS</span>
                    </div>
                    <h1 className="text-lg font-bold">Site Surveys</h1>
                  </div>
                  <div className="flex items-center gap-2">
                    <Btn onClick={() => setScreen("newProject")}>+ New Project</Btn>
                    <button onClick={signOut} className="text-xs text-gray-400 hover:text-gray-600 px-2 py-1 rounded transition-colors" title="Sign out">↩</button>
                  </div>
                </div>
                <div className="flex items-center justify-between">
                  <p className="text-xs text-gray-500">
                    {currentUser?.displayName ?? currentUser?.email} · {visibleProjects.length} project{visibleProjects.length !== 1 && "s"}
                  </p>
                  <div className="flex rounded-lg overflow-hidden border border-gray-200 text-xs font-medium">
                    <button
                      onClick={() => setShowMyProjects(false)}
                      className={`px-3 py-1 transition-colors ${!showMyProjects ? "bg-[#493FD1] text-white" : "bg-white text-gray-500 hover:bg-gray-50"}`}>
                      All
                    </button>
                    <button
                      onClick={() => setShowMyProjects(true)}
                      className={`px-3 py-1 transition-colors ${showMyProjects ? "bg-[#493FD1] text-white" : "bg-white text-gray-500 hover:bg-gray-50"}`}>
                      Mine
                    </button>
                  </div>
                </div>
              </div>

                <div className="relative mt-2">
                  <input
                    className="w-full border border-gray-200 rounded-lg pl-8 pr-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#5a50d8] bg-gray-50"
                    placeholder="Search projects…"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                  <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
                </div>
              <div className="p-4 space-y-3">
                {visibleProjects.length === 0 && (
                  <div className="text-center py-16 text-gray-400">
                    <div className="text-5xl mb-3">📋</div>
                    <p className="text-sm font-medium">No projects yet</p>
                    <p className="text-xs mt-1">Projects assigned to you will appear here</p>
                  </div>
                )}
                {visibleProjects.map((p) => {
                  const total = p.floors.flatMap((f) => f.devices).length;
                  const done  = p.floors.flatMap((f) => f.devices).filter((d) => d.complete).length;
                  return (
                    <button key={p.id}
                      onClick={() => { setTechMode(false); setActiveId(p.id); setTab("floors"); setScreen("project"); }}
                      className="w-full bg-white rounded-xl border border-gray-200 p-4 text-left hover:border-[#7069df] hover:shadow-sm transition-all">
                      <div className="flex items-start justify-between gap-2 mb-1">
                        <div className="min-w-0">
                          <p className="font-semibold text-sm truncate">{p.name}</p>
                          <p className="text-xs text-gray-500">{p.siteName}</p>
                        </div>
                        <Badge status={p.status} />
                      </div>
                      <div className="flex flex-wrap gap-3 mt-2 text-xs text-gray-400">
                        {p.address && <span>📍 {p.address}</span>}
                        <span className={total > 0 ? (done === total ? "text-emerald-600 font-medium" : "text-blue-600 font-medium") : ""}>
                          {total === 0 ? "No devices" : `${done}/${total} devices done`}
                        </span>
                        <span>{p.floors.length} floor{p.floors.length !== 1 && "s"}</span>
                      </div>
                      <div className="mt-1 text-xs text-gray-400">
                        👤 VS: <span className="text-gray-600 font-medium">{p.vsContact.name || "Unassigned"}</span>
                      </div>
                      {total > 0 && (
                        <div className="mt-2.5 h-1 bg-gray-100 rounded-full overflow-hidden">
                          <div className="h-full bg-[#5a50d8] rounded-full" style={{ width: `${(done / total) * 100}%` }} />
                        </div>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* ══════════════ NEW PROJECT ══════════════ */}
          {screen === "newProject" && (
            <div className="max-w-lg mx-auto pb-8">
              <div className="bg-white border-b px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
                <button onClick={() => setScreen("list")} className="text-[#493FD1] text-sm font-medium">← Back</button>
                <h1 className="font-bold">New Project</h1>
              </div>
              <div className="p-4">
                <Field label="Project Name" hint="e.g. Chicago HQ – Floors 3–5">
                  <Input placeholder="Project name…" value={np.name} onChange={(e) => setNp({ ...np, name: e.target.value })} />
                </Field>
                <Field label="Site / Company">
                  <Input placeholder="Company or client name…" value={np.siteName} onChange={(e) => setNp({ ...np, siteName: e.target.value })} />
                </Field>
                <Field label="Address">
                  <Input placeholder="123 Main St, City, State…" value={np.address} onChange={(e) => setNp({ ...np, address: e.target.value })} />
                </Field>
                <Divider label="VergeSense Contact" />
                <Field label="Select Contact">
                  <Sel value={np.vsPreset} onChange={(e) => {
                    const found = VS_CONTACTS.find((c) => c.name === e.target.value);
                    if (found) setNp({ ...np, vsPreset: found.name, vsName: found.name === "Other (enter below)" ? "" : found.name, vsEmail: found.email });
                  }}>
                    <option value="">Choose a VS contact…</option>
                    {VS_CONTACTS.map((c) => <option key={c.name} value={c.name}>{c.name}</option>)}
                  </Sel>
                </Field>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="Name">
                    <Input placeholder="Full name" value={np.vsName} onChange={(e) => setNp({ ...np, vsName: e.target.value })} />
                  </Field>
                  <Field label="Email">
                    <Input type="email" placeholder="email@vergesense.com" value={np.vsEmail} onChange={(e) => setNp({ ...np, vsEmail: e.target.value })} />
                  </Field>
                </div>
                <p className="text-xs text-gray-400 mb-5">
                  Upload floor plan markups per-floor after creating the project. If you upload a PDF markup, the app can auto-detect and place device pins for you.
                </p>
                <Btn size="lg" className="w-full" disabled={!np.name || !np.siteName || !np.vsName || !np.vsEmail} onClick={createProject}>
                  Create Project →
                </Btn>
              </div>
            </div>
          )}

          {/* ══════════════ PROJECT DETAIL ══════════════ */}
          {screen === "project" && project && (
            <div className="max-w-lg mx-auto" style={{ minHeight: "100vh" }}>
              <div className="bg-white border-b px-4 py-3 sticky top-0 z-10">
                {!techMode && <button onClick={() => setScreen("list")} className="text-[#493FD1] text-sm font-medium">← Projects</button>}
                <div className="flex items-start justify-between gap-2 mt-0.5">
                  <div className="min-w-0">

                          <div className="flex-1 min-w-0">

                            <p className="text-xs text-gray-400">
                              {dev.mountingMethod ? `Mount: ${dev.mountingMethod}` : <span className="text-amber-600">No mount method</span>}
                              {dev.ceilingHeight && ` · ${dev.ceilingHeight}`}
                            </p>
                            {dev.photos.length > 0 && <p className="text-xs text-gray-400">📷 {dev.photos.length} photo{dev.photos.length !== 1 && "s"}</p>}
                          </div>
                          <div className="flex gap-1 flex-shrink-0">
                            <button onClick={() => {
                              setActiveDevId(dev.id);
                              setDf({ ceilingHeight: dev.ceilingHeight, mountingMethod: dev.mountingMethod, deviceType: dev.deviceType, notes: dev.notes, photos: dev.photos, en1_doorFrameHeight: dev.en1_doorFrameHeight || "", en1_doorWidth: dev.en1_doorWidth || "", en1_exitSigns: dev.en1_exitSigns || "", en1_sprinklers: dev.en1_sprinklers || "", en1_hangingFixtures: dev.en1_hangingFixtures || "", en1_doorDirection: dev.en1_doorDirection || "" });
                              setScreen("device");
                            }} className={`text-xs font-medium px-2.5 py-1.5 rounded-lg ${techLocked ? "text-gray-500 hover:bg-gray-100" : "text-[#493FD1] hover:bg-[#f0effc]"}`}>
                              {techLocked ? "View" : "Edit"}
                            </button>
                            {!techMode && (
                              <button onClick={() => deleteDevice(dev.id)} className="text-red-500 text-xs font-medium px-2.5 py-1.5 rounded-lg hover:bg-red-50">✕</button>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ══════════════ DEVICE FORM ══════════════ */}
          {screen === "device" && project && activeFloor && activeDev && (
            <div className="max-w-lg mx-auto pb-8">
              <div className="bg-white border-b px-4 py-3 flex items-center justify-between sticky top-0 z-10">
                <button onClick={() => setScreen("floor")} className="text-[#493FD1] text-sm font-medium">← {activeFloor.name}</button>
                <h2 className="font-bold">Device #{activeDev.number}{activeDev.deviceType && ` · ${activeDev.deviceType}`}</h2>
                <div className="w-16" />
              </div>
              <div className="p-4">
                <DeviceLocator
                  floorPlan={activeFloor.floorPlan}
                  device={activeDev}
                  allDevices={activeFloor.devices}
                  pdfDisplayUrl={pdfDisplayUrl}
                />

                {techLocked && (
                  <div className="mb-4 bg-red-50 border border-red-200 rounded-xl p-3 flex items-start gap-2">
                    <span className="text-lg mt-0.5">🔒</span>
                    <div>
                      <p className="text-sm font-semibold text-red-700">Survey Submitted</p>
                      <p className="text-xs text-red-500 mt-0.5">This project has been submitted for VS review. Editing is locked.</p>
                    </div>
                  </div>
                )}
                <Field label="Device Type">
                  <Sel value={df.deviceType} onChange={(e) => setDf({ ...df, deviceType: e.target.value })} disabled={techLocked}>
                    <option value="">Select device type…</option>
                    {DEVICE_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
                  </Sel>
                </Field>

                {df.deviceType === 'EN1' ? (
                  <>
                    <Field label="Door Frame Height">
                      <Input placeholder='e.g. 7ft, 80in' value={df.en1_doorFrameHeight || ""} onChange={(e) => setDf({ ...df, en1_doorFrameHeight: e.target.value })} disabled={techLocked} />
                    </Field>
                    <Field label="Ceiling Height">
                      <Input placeholder='e.g. 9ft, 10ft 6in' value={df.ceilingHeight} onChange={(e) => setDf({ ...df, ceilingHeight: e.target.value })} disabled={techLocked} />
                    </Field>
                    <Field label="Door / Entry Width">
                      <Input placeholder='e.g. 36in, 3ft' value={df.en1_doorWidth || ""} onChange={(e) => setDf({ ...df, en1_doorWidth: e.target.value })} disabled={techLocked} />
                    </Field>
                    <Field label="Mounting Tier">
                      <Sel value={df.mountingMethod} onChange={(e) => setDf({ ...df, mountingMethod: e.target.value })} disabled={techLocked}>
                        <option value="">Select mounting tier…</option>
                        {MOUNTING.map((m) => <option key={m} value={m}>{m}</option>)}
                      </Sel>
                      <p className="text-xs text-gray-400 mt-1">T1 = magnet · T2 = screws · T3 = adhesive, angle mounts · T4 = drop rods</p>
                    </Field>
                    <div className="grid grid-cols-3 gap-3">
                      <Field label="Exit Signs">
                        <Sel value={df.en1_exitSigns || ""} onChange={(e) => setDf({ ...df, en1_exitSigns: e.target.value })} disabled={techLocked}>
                          <option value="">—</option>
                          <option value="yes">Yes</option>
                          <option value="no">No</option>
                        </Sel>
                      </Field>
                      <Field label="Sprinklers">
                        <Sel value={df.en1_sprinklers || ""} onChange={(e) => setDf({ ...df, en1_sprinklers: e.target.value })} disabled={techLocked}>
                          <option value="">—</option>
                          <option value="yes">Yes</option>
                          <option value="no">No</option>
                        </Sel>
                      </Field>
                      <Field label="Hanging Fixtures">
                        <Sel value={df.en1_hangingFixtures || ""} onChange={(e) => setDf({ ...df, en1_hangingFixtures: e.target.value })} disabled={techLocked}>
                          <option value="">—</option>
                          <option value="yes">Yes</option>
                          <option value="no">No</option>
                        </Sel>
                      </Field>
                    </div>
                    <Field label="Door Opens">
                      <Sel value={df.en1_doorDirection || ""} onChange={(e) => setDf({ ...df, en1_doorDirection: e.target.value })} disabled={techLocked}>
                        <option value="">Select direction…</option>
                        <option value="inward">Inward</option>
                        <option value="outward">Outward</option>
                        <option value="both">Both directions</option>
                        <option value="sliding">Sliding</option>
                      </Sel>
                    </Field>
                    <Field label="Notes">
                      <TA placeholder="Anything specific about this EN1 location…" value={df.notes} onChange={(e) => setDf({ ...df, notes: e.target.value })} disabled={techLocked} />
                    </Field>
                    <Field label="Photos" hint={techLocked ? undefined : "All 8 angles required — see list above"}>
                      <div className="mb-3 bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-800">
                        <p className="font-semibold mb-1.5">📷 Required photo angles for EN1:</p>
                        <div className="grid grid-cols-2 gap-x-3 gap-y-0.5">
                          <span>• Close-up view</span>
                          <span>• Mid-range (front)</span>
                          <span>• Mid-range (interior)</span>
                          <span>• Wide angle (doorway)</span>
                          <span>• Side view</span>
                          <span>• Wide angle (hallway)</span>
                          <span>• Interior view</span>
                          <span>• Exterior view</span>
                        </div>
                      </div>
                      <div className="flex flex-wrap gap-2">
                        {df.photos.map((photo, i) => (
                          <div key={i} className="relative w-20 h-20 flex-shrink-0">
                            <img src={photo} alt={`photo ${i + 1}`}
                              className="w-full h-full object-cover rounded-lg border border-gray-200 cursor-pointer"
                              onClick={() => setPhotoLightbox({ url: photo, photos: df.photos, index: i })} />
                            {!techLocked && (
                              <button onClick={() => setDf({ ...df, photos: df.photos.filter((_, j) => j !== i) })}
                                className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center shadow">✕</button>
                            )}
                          </div>
                        ))}
                        {!techLocked && (
                          <>
                            <label className="w-20 h-20 border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:border-[#7069df] text-gray-400 flex-shrink-0">
                              <span className="text-xl leading-none">📷</span>
                              <span className="text-xs mt-0.5">Camera</span>
                              <input type="file" accept="image/*" capture="environment" className="hidden"
                                onChange={async (e) => {
                                  const files = Array.from(e.target.files ?? []);
                                  if (!files.length) return;
                                  showToast("Uploading photos...", "info");
                                  try {
                                    const urls = await Promise.all(files.map(async (file) => {
                                      const path = `photos/${activeId}/${activeFloorId}/${activeDevId}/${Date.now()}_${file.name}`;
                                      const ref = storage.ref(path);
                                      await ref.put(file, { contentType: file.type });
                                      return ref.getDownloadURL();
                                    }));
                                    setDf(prev => ({ ...prev, photos: [...prev.photos, ...urls] }));
                                    showToast(`${urls.length} photo${urls.length > 1 ? 's' : ''} uploaded ✓`);
                                  } catch (err) {
                                    console.error('Photo upload failed:', err);
                                    showToast('Photo upload failed: ' + err.message, 'error');
                                  }
                                }} />
                            </label>
                            <label className="w-20 h-20 border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:border-[#7069df] text-gray-400 flex-shrink-0">
                              <span className="text-xl leading-none">🖼️</span>
                              <span className="text-xs mt-0.5">Gallery</span>
                              <input type="file" accept="image/*" multiple className="hidden"
                                onChange={async (e) => {
                                  const files = Array.from(e.target.files ?? []);
                                  if (!files.length) return;
                                  showToast("Uploading photos...", "info");
                                  try {
                                    const urls = await Promise.all(files.map(async (file) => {
                                      const path = `photos/${activeId}/${activeFloorId}/${activeDevId}/${Date.now()}_${file.name}`;
                                      const ref = storage.ref(path);
                                      await ref.put(file, { contentType: file.type });
                                      return ref.getDownloadURL();
                                    }));
                                    setDf(prev => ({ ...prev, photos: [...prev.photos, ...urls] }));
                                    showToast(`${urls.length} photo${urls.length > 1 ? 's' : ''} uploaded ✓`);
                                  } catch (err) {
                                    console.error('Photo upload failed:', err);
                                    showToast('Photo upload failed: ' + err.message, 'error');
                                  }
                                }} />
                            </label>
                          </>
                        )}
                      </div>
                    </Field>
                  </>
                ) : (
                  <>
                    <Field label="Ceiling Height">
                      <Input placeholder='e.g. 9ft, 10ft 6in' value={df.ceilingHeight} onChange={(e) => setDf({ ...df, ceilingHeight: e.target.value })} disabled={techLocked} />
                    </Field>
                    <Field label="Mounting Method">
                      <Sel value={df.mountingMethod} onChange={(e) => setDf({ ...df, mountingMethod: e.target.value })} disabled={techLocked}>
                        <option value="">Select mounting method…</option>
                        {MOUNTING.map((m) => <option key={m} value={m}>{m}</option>)}
                      </Sel>
                      <p className="text-xs text-gray-400 mt-1">T1 = magnet · T2 = screws · T3 = adhesive, angle mounts · T4 = drop rods</p>
                    </Field>
                    <Field label="Notes">
                      <TA placeholder="Anything specific about this device location…" value={df.notes} onChange={(e) => setDf({ ...df, notes: e.target.value })} disabled={techLocked} />
                    </Field>
                    <Field label="Photos" hint={techLocked ? undefined : "Tap + to take a photo or choose from gallery"}>
                      <div className="flex flex-wrap gap-2">
                        {df.photos.map((photo, i) => (
                          <div key={i} className="relative w-20 h-20 flex-shrink-0">
                            <img src={photo} alt={`photo ${i + 1}`}
                              className="w-full h-full object-cover rounded-lg border border-gray-200 cursor-pointer"
                              onClick={() => setPhotoLightbox({ url: photo, photos: df.photos, index: i })} />
                            {!techLocked && (
                              <button onClick={() => setDf({ ...df, photos: df.photos.filter((_, j) => j !== i) })}
                                className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center shadow">✕</button>
                            )}
                          </div>
                        ))}
                        {!techLocked && (
                          <>
                            <label className="w-20 h-20 border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:border-[#7069df] text-gray-400 flex-shrink-0">
                              <span className="text-xl leading-none">📷</span>
                              <span className="text-xs mt-0.5">Camera</span>
                              <input type="file" accept="image/*" capture="environment" className="hidden"
                                onChange={async (e) => {
                                  const files = Array.from(e.target.files ?? []);
                                  if (!files.length) return;
                                  showToast("Uploading photos...", "info");
                                  try {
                                    const urls = await Promise.all(files.map(async (file) => {
                                      const path = `photos/${activeId}/${activeFloorId}/${activeDevId}/${Date.now()}_${file.name}`;
                                      const ref = storage.ref(path);
                                      await ref.put(file, { contentType: file.type });
                                      return ref.getDownloadURL();
                                    }));
                                    setDf(prev => ({ ...prev, photos: [...prev.photos, ...urls] }));
                                    showToast(`${urls.length} photo${urls.length > 1 ? 's' : ''} uploaded ✓`);
                                  } catch (err) {
                                    console.error('Photo upload failed:', err);
                                    showToast('Photo upload failed: ' + err.message, 'error');
                                  }
                                }} />
                            </label>
                            <label className="w-20 h-20 border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:border-[#7069df] text-gray-400 flex-shrink-0">
                              <span className="text-xl leading-none">🖼️</span>
                              <span className="text-xs mt-0.5">Gallery</span>
                              <input type="file" accept="image/*" multiple className="hidden"
                                onChange={async (e) => {
                                  const files = Array.from(e.target.files ?? []);
                                  if (!files.length) return;
                                  showToast("Uploading photos...", "info");
                                  try {
                                    const urls = await Promise.all(files.map(async (file) => {
                                      const path = `photos/${activeId}/${activeFloorId}/${activeDevId}/${Date.now()}_${file.name}`;
                                      const ref = storage.ref(path);
                                      await ref.put(file, { contentType: file.type });
                                      return ref.getDownloadURL();
                                    }));
                                    setDf(prev => ({ ...prev, photos: [...prev.photos, ...urls] }));
                                    showToast(`${urls.length} photo${urls.length > 1 ? 's' : ''} uploaded ✓`);
                                  } catch (err) {
                                    console.error('Photo upload failed:', err);
                                    showToast('Photo upload failed: ' + err.message, 'error');
                                  }
                                }} />
                            </label>
                          </>
                        )}
                      </div>
                    </Field>
                  </>
                )}
                <div className="flex gap-2 mt-2">
                  <Btn variant="secondary" className="flex-1" onClick={() => setScreen("floor")}>{techLocked ? "← Back" : "Cancel"}</Btn>
                  {!techLocked && <Btn className="flex-1" onClick={saveDevice}>Save Device ✓</Btn>}
                </div>
              </div>
            </div>
          )}

          {/* ══════════════ PHOTO LIGHTBOX ══════════════ */}
          {photoLightbox && (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50"
              onClick={() => setPhotoLightbox(null)}>
              {/* Prev arrow */}
              {photoLightbox.photos.length > 1 && photoLightbox.index > 0 && (
                <button className="absolute left-4 text-white text-4xl font-bold z-10 px-2"
                  onClick={e => { e.stopPropagation(); setPhotoLightbox(lb => ({ ...lb, index: lb.index - 1, url: lb.photos[lb.index - 1] })); }}>‹</button>
              )}
              {/* Image */}
              <div className="flex flex-col items-center max-w-full max-h-full px-12" onClick={e => e.stopPropagation()}>
                <img src={photoLightbox.url} alt="photo"
                  className="max-w-full max-h-[80vh] object-contain rounded-lg shadow-2xl" />
                <div className="flex items-center gap-4 mt-4">
                  <span className="text-white/60 text-sm">{photoLightbox.index + 1} / {photoLightbox.photos.length}</span>
                  <a href={photoLightbox.url} target="_blank" rel="noopener noreferrer" download
                    className="text-white text-sm underline opacity-70 hover:opacity-100">Download</a>
                </div>
              </div>
              {/* Next arrow */}
              {photoLightbox.photos.length > 1 && photoLightbox.index < photoLightbox.photos.length - 1 && (
                <button className="absolute right-4 text-white text-4xl font-bold z-10 px-2"
                  onClick={e => { e.stopPropagation(); setPhotoLightbox(lb => ({ ...lb, index: lb.index + 1, url: lb.photos[lb.index + 1] })); }}>›</button>
              )}
              {/* Close button */}
              <button className="absolute top-4 right-4 text-white text-2xl font-bold opacity-70 hover:opacity-100"
                onClick={() => setPhotoLightbox(null)}>✕</button>
            </div>
          )}

          {/* ══════════════ SCAN MARKUP MODAL ══════════════ */}
          {scanModal && (
            <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
                <div className="text-3xl mb-2 text-center">✨</div>
                <h3 className="text-lg font-bold text-center mb-1">Auto-Detected Devices</h3>
                <p className="text-xs text-gray-500 text-center mb-4">
                  Found by scanning icon colors in your markup PDF
                </p>

                {scanTotal > 0 ? (
                  <div className="grid grid-cols-3 gap-2 mb-4">
                    {[
                      { label: "GW",  count: scanCount.GW,     color: "teal" },
                      { label: "EN1", count: scanCount.EN1,    color: "orange" },
                      { label: scanModal.sensorType, count: scanCount.SENSOR, color: "blue" },
                    ].map(({ label, count, color }) => (
                      <div key={label} className={`text-center rounded-xl p-3 border bg-${color}-50 border-${color}-200`}>
                        <div className={`text-2xl font-bold text-${color}-700`}>{count}</div>
                        <div className={`text-xs font-semibold text-${color}-600`}>{label}</div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="mb-4 bg-gray-50 rounded-xl p-4 text-center text-sm text-gray-500">
                    No devices detected in this PDF.
                  </div>
                )}

                {scanTotal > 0 && (
                  <>
                    {scanHasGW ? (
                      <div className="mb-4 bg-[#f0effc] border border-[#c4c0f4] rounded-xl p-3 text-xs text-[#3a31c4] flex items-start gap-2">
                        <span className="text-base mt-0.5">✓</span>
                        <span>Gateway detected — area sensors set to <strong>L410</strong></span>
                      </div>
                    ) : scanCount.SENSOR > 0 ? (
                      <div className="mb-4 bg-amber-50 border border-amber-200 rounded-xl p-3">
                        <p className="text-xs font-semibold text-amber-800 mb-2">No gateway detected. Are these area sensors L410 or E106?</p>
                        <div className="flex gap-2">
                          {["L410", "E106"].map((type) => (
                            <button key={type}
                              onClick={() => setScanModal({ ...scanModal, sensorType: type })}
                              className={`flex-1 py-2 text-sm font-bold rounded-xl border-2 transition-colors ${
                                scanModal.sensorType === type
                                  ? "border-[#493FD1] bg-[#493FD1] text-white"
                                  : "border-gray-300 text-gray-600 hover:border-gray-400"
                              }`}>
                              {type}
                            </button>
                          ))}
                        </div>
                      </div>
                    ) : null}
                  </>
                )}

                <div className="flex gap-2">
                  <Btn variant="secondary" className="flex-1" onClick={() => setScanModal(null)}>Cancel</Btn>
                  {scanTotal > 0 && (
                    <Btn className="flex-1" onClick={() => bulkPlaceDevices(scanModal.detected, scanHasGW ? "L410" : scanModal.sensorType)}>
                      Place {scanTotal} Devices
                    </Btn>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* ══════════════ CONFIRM SUBMIT MODAL ══════════════ */}
          {confirmReady && project && (
            <div className="fixed inset-0 bg-black/50 flex items-end sm:items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
                <div className="text-3xl mb-3 text-center">📤</div>
                <h3 className="text-lg font-bold text-center mb-2">Submit Survey?</h3>
                <p className="text-sm text-gray-600 text-center mb-1">This will send your survey data and notify:</p>
                <div className="bg-[#f0effc] border border-[#c4c0f4] rounded-xl p-3 mb-5 text-center">
                  <p className="font-semibold text-[#2e2599] text-sm">{project.vsContact.name}</p>
                  <p className="text-xs text-[#493FD1]">{project.vsContact.email}</p>
                </div>
                <div className="flex gap-2">
                  <Btn variant="secondary" className="flex-1" onClick={() => setConfirmReady(false)}>Not yet</Btn>
                  <Btn variant="success" className="flex-1" onClick={submitSurvey}>Submit Survey ✓</Btn>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SiteSurveyApp));
  </script>
</body>
</html>
